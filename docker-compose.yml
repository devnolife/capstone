services:
  db:
    image: postgres:16-alpine
    container_name: capstone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ifbumm
      POSTGRES_DB: capstone
    ports:
      - "5401:5432"
    volumes:
      - capstone-db-data:/var/lib/postgresql/data
    networks:
      - capstone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d capstone"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capstone-app
    restart: unless-stopped
    ports:
      - "3099:3099"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:ifbumm@db:5432/capstone?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capstone-network

volumes:
  capstone-db-data:

networks:
  capstone-network:
    driver: bridge
